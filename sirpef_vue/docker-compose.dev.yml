version: "3.9"
services:
 oac_vue_mppef_dev:    
    image: node:18.8.0
    ports:
      - "5173:81"
    volumes:
      - ".:/app"
    environment:
      NODE_ENV: development
    working_dir: /app
    container_name: oac_vue_mppef_dev
    command: sh -c "cd /app; npm install; npm run dev -- --host"
